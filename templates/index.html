<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ProgressLab</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/dashboard.css">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ProgressLab">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/images/apple-touch-icon.png">
</head>
<body class="h-full flex flex-col">

    <!-- Шапка возвращена, но сделана более компактной -->
    <header class="text-center" style="padding-top: calc(0.5rem + env(safe-area-inset-top)); padding-bottom: 0.5rem;">
        <h1 class="text-2xl font-bold tracking-wider">ProgressLab</h1>
        <p class="text-xs text-gray-500">Beta 0.1</p>
    </header>

    <main class="flex-grow flex flex-col items-center justify-start px-4 space-y-4 pb-24">

        <!-- 1. Центральное кольцо калорий (Уменьшено) -->
        <div class="ring-container w-1/3 max-w-xs aspect-square neon-glow-amber relative">
            <svg id="calorie-ring" class="progress-ring-svg" viewBox="0 0 120 120">
                <circle class="progress-ring-bg" cx="60" cy="60" r="54" />
                <circle class="progress-ring-bar" cx="60" cy="60" r="54" style="stroke: var(--color-amber);" />
                <circle class="progress-ring-overflow" cx="60" cy="60" r="54" />
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
                <span class="calorie-label text-xs">КАЛОРИИ</span>
                <span id="calories-consumed" class="text-4xl font-extrabold" style="color: var(--color-amber);">0</span>
                <span class="calorie-goal-text" id="calorie-goal-info" style="font-size: 0.75rem;">ВСЕГО:</span>
            </div>
        </div>

        <!-- 2. Сетка макронутриентов (Уменьшено) -->
        <div class="flex justify-around w-full max-w-lg space-x-4">
            <!-- Белки -->
            <div class="text-center flex flex-col items-center space-y-1">
                <div class="ring-container w-16 aspect-square neon-glow-protein-white relative">
                    <svg id="protein-ring" class="progress-ring-svg" viewBox="0 0 120 120">
                        <circle class="progress-ring-bg" cx="60" cy="60" r="54" />
                        <circle class="progress-ring-bar" cx="60" cy="60" r="54" style="stroke: var(--color-protein-white);" />
                        <circle class="progress-ring-overflow" cx="60" cy="60" r="54" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="protein-consumed" class="font-bold text-xl" style="color: var(--color-protein-white);">0г</span>
                    </div>
                </div>
                <p class="text-sm font-semibold" style="color: var(--color-protein-white);">Белки</p>
                <p id="protein-goal" class="macro-goal-value text-xs -mt-1">0г</p>
            </div>
            <!-- Жиры -->
            <div class="text-center flex flex-col items-center space-y-1">
                <div class="ring-container w-16 aspect-square neon-glow-golden-orange relative">
                    <svg id="fat-ring" class="progress-ring-svg" viewBox="0 0 120 120">
                        <circle class="progress-ring-bg" cx="60" cy="60" r="54" />
                        <circle class="progress-ring-bar" cx="60" cy="60" r="54" style="stroke: var(--color-golden-orange);" />
                        <circle class="progress-ring-overflow" cx="60" cy="60" r="54" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="fat-consumed" class="font-bold text-xl" style="color: var(--color-golden-orange);">0г</span>
                    </div>
                </div>
                <p class="text-sm font-semibold" style="color: var(--color-golden-orange);">Жиры</p>
                <p id="fat-goal" class="macro-goal-value text-xs -mt-1">0г</p>
            </div>
            <!-- Углеводы -->
            <div class="text-center flex flex-col items-center space-y-1">
                <div class="ring-container w-16 aspect-square neon-glow-muted-teal relative">
                    <svg id="carbs-ring" class="progress-ring-svg" viewBox="0 0 120 120">
                        <circle class="progress-ring-bg" cx="60" cy="60" r="54" />
                        <circle class="progress-ring-bar" cx="60" cy="60" r="54" style="stroke: var(--color-muted-teal);" />
                        <circle class="progress-ring-overflow" cx="60" cy="60" r="54" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="carbs-consumed" class="font-bold text-xl" style="color: var(--color-muted-teal);">0г</span>
                    </div>
                </div>
                <p class="text-sm font-semibold" style="color: var(--color-muted-teal);">Углеводы</p>
                <p id="carbs-goal" class="macro-goal-value text-xs -mt-1">0г</p>
            </div>
        </div>

        <!-- 3. Индекс дисциплины питания -->
        <div class="w-full px-4 mt-4">
            <h2 class="text-sm text-gray-400 font-semibold mb-2 text-center">Индекс дисциплины питания</h2>
            <div class="relative h-28 w-full glassmorphism neon-glow-pantone-gray rounded-2xl flex items-end justify-around pb-2 pt-2 px-2">
                <div class="absolute top-1/2 left-0 right-0 border-t border-dashed border-[#F0F0F0]/80 -translate-y-1/2"></div>
                <span id="average-score-label" class="absolute top-1/2 left-2 -translate-y-1/2 text-xs font-bold text-[#F0F0F0] hidden px-2" style="background-color: #1a202c; text-shadow: 0 0 8px #F0F0F0;"></span>
                <div id="score-graph-container" class="flex justify-around w-full h-full relative z-10 pl-8">
                    <!-- Circles will be dynamically added here by JS -->
                </div>
            </div>
        </div>

        <!-- 4. Индекс дисциплины тренировок -->
        <div class="w-full px-4 mt-4">
            <h2 class="text-sm text-gray-400 font-semibold mb-2 text-center">Индекс дисциплины тренировок</h2>
            <div class="relative h-28 w-full glassmorphism neon-glow-pantone-gray rounded-2xl flex items-end justify-around pb-2 pt-2 px-2">
                <div class="absolute top-1/2 left-0 right-0 border-t border-dashed border-[#F0F0F0]/80 -translate-y-1/2"></div>
                <span id="training-average-score-label" class="absolute top-1/2 left-2 -translate-y-1/2 text-xs font-bold text-[#F0F0F0] hidden px-2" style="background-color: #1a202c; text-shadow: 0 0 8px #F0F0F0;"></span>
                <div id="training-score-graph-container" class="flex justify-around w-full h-full relative z-10 pl-8">
                    <!-- Circles for training score will be dynamically added here by a different JS function -->
                </div>
            </div>
        </div>

    </main>

    {% set active_page = 'dashboard' %}
    {% include 'includes/bottom_nav.html' %}

    <!-- Tooltip for Score Graph -->
    <div id="score-tooltip" class="absolute z-50 p-3 rounded-2xl glassmorphism neon-glow-pantone-gray text-white opacity-0 transition-all duration-300 pointer-events-none shadow-2xl" style="min-width: 180px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); transform: scale(0.9);">
        <p class="font-black text-base mb-1.5 tracking-wide border-b border-white/10 pb-1" id="tooltip-date"></p>
        <div class="space-y-1 text-sm">
            <div class="flex justify-between items-center">
                <span class="text-gray-400">Score:</span>
                <span id="tooltip-score" class="font-bold text-lg"></span>
            </div>
            <div class="flex justify-between items-center">
                <span style="color: var(--color-amber);">Ккал:</span>
                <span class="font-medium"><span id="tooltip-calories"></span> / <span id="tooltip-target-calories"></span></span>
            </div>
            <div class="flex justify-between items-center">
                <span style="color: var(--color-protein-white);">Белки:</span>
                <span class="font-medium"><span id="tooltip-protein"></span>г / <span id="tooltip-target-protein"></span>г</span>
            </div>
            <div class="flex justify-between items-center">
                <span style="color: var(--color-golden-orange);">Жиры:</span>
                <span class="font-medium"><span id="tooltip-fat"></span>г / <span id="tooltip-target-fat"></span>г</span>
            </div>
            <div class="flex justify-between items-center">
                <span style="color: var(--color-muted-teal);">Углеводы:</span>
                <span class="font-medium"><span id="tooltip-carbs"></span>г / <span id="tooltip-target-carbs"></span>г</span>
            </div>
        </div>
        <div class="mt-2 text-xs italic font-medium leading-tight opacity-90" id="tooltip-message"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const OVERFLOW_STYLES = {
                calories:  { glowClass: 'overflow-glow-red'   },
                protein:   { glowClass: 'overflow-glow-green' },
                fat:       { glowClass: 'overflow-glow-red'   },
                carbs:     { glowClass: 'overflow-glow-red'   },
            };

            // Mapping for neon glow classes
            const NEON_GLOW_CLASSES = {
                '#FFD700': 'neon-glow-emerald', // Золотой
                '#F0F0F0': 'neon-glow-white',   // Белый
                '#f59e0b': 'neon-glow-amber-score',
                '#e11d48': 'neon-glow-rose'
            };

            function getNeonGlowClass(hexColor) {
                return NEON_GLOW_CLASSES[hexColor] || ''; // Return empty string if no match
            }

            function getMacroType(ringId) {
                if (ringId.includes('protein'))   return 'protein';
                if (ringId.includes('fat'))       return 'fat';
                if (ringId.includes('carbs'))     return 'carbs';
                return 'calories';
            }

            function updateRingWithOverflow(ringId, consumed, goal) {
                const ring = document.getElementById(ringId);
                if (!ring) return;

                const type = getMacroType(ringId);
                const style = OVERFLOW_STYLES[type];
                const bar = ring.querySelector('.progress-ring-bar');
                const overflowBar = ring.querySelector('.progress-ring-overflow');
                const container = ring.closest('.ring-container');
                const radius = bar.r.baseVal.value;
                const circumference = 2 * Math.PI * radius;

                bar.style.strokeDasharray = `${circumference} ${circumference}`;
                overflowBar.style.strokeDasharray = `${circumference} ${circumference}`;

                // Убираем старые glow-классы
                if (container) container.classList.remove('overflow-glow-red', 'overflow-glow-green');
                overflowBar.classList.remove('overflow-red', 'overflow-green');

                if (goal === 0) {
                    bar.style.strokeDashoffset = circumference;
                    overflowBar.style.strokeDashoffset = circumference;
                    return;
                }

                const percentage = consumed / goal;

                // Основной бар (до 100%)
                const mainPercentage = Math.min(percentage, 1);
                const mainOffset = circumference - (mainPercentage * circumference);
                bar.style.strokeDashoffset = mainOffset;

                // Бар переполнения (после 100%)
                if (percentage > 1) {
                    const overflowColorClass = type === 'protein' ? 'overflow-green' : 'overflow-red';
                    overflowBar.classList.add(overflowColorClass);
                    if (container) container.classList.add(style.glowClass);

                    const overflowPercentage = Math.min(percentage - 1, 1);
                    const overflowOffset = circumference - (overflowPercentage * circumference);
                    overflowBar.style.strokeDashoffset = overflowOffset;
                } else {
                    overflowBar.style.strokeDashoffset = circumference;
                }
            }

            async function fetchDashboardData() {
                try {
                    const response = await fetch('/users/me/dashboard-stats', {
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('accessToken')}` }
                    });

                    if (!response.ok) {
                        if (response.status === 401) window.location.href = '/';
                        throw new Error('Failed to fetch dashboard data');
                    }

                    const data = await response.json();

                    // Калории
                    document.getElementById('calories-consumed').textContent = Math.round(data.consumed_calories);
                    document.getElementById('calorie-goal-info').textContent = `ВСЕГО: ${Math.round(data.target_calories)}`;
                    updateRingWithOverflow('calorie-ring', data.consumed_calories, data.target_calories);

                    // Белки
                    document.getElementById('protein-consumed').textContent = `${Math.round(data.consumed_protein)}г`;
                    document.getElementById('protein-goal').textContent = `${Math.round(data.target_protein)}г`;
                    updateRingWithOverflow('protein-ring', data.consumed_protein, data.target_protein);

                    // Жиры
                    document.getElementById('fat-consumed').textContent = `${Math.round(data.consumed_fat)}г`;
                    document.getElementById('fat-goal').textContent = `${Math.round(data.target_fat)}г`;
                    updateRingWithOverflow('fat-ring', data.consumed_fat, data.target_fat);

                    // Углеводы
                    document.getElementById('carbs-consumed').textContent = `${Math.round(data.consumed_carbohydrates)}г`;
                    document.getElementById('carbs-goal').textContent = `${Math.round(data.target_carbohydrates)}г`;
                    updateRingWithOverflow('carbs-ring', data.consumed_carbohydrates, data.target_carbohydrates);

                } catch (error) {
                    console.error('Error fetching dashboard data:', error);
                }
            }

            async function fetchWeeklySummaryData() {
                try {
                    const response = await fetch('/users/me/stats/weekly-summary', {
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('accessToken')}` }
                    });

                    if (!response.ok) {
                        if (response.status === 401) window.location.href = '/';
                        throw new Error('Failed to fetch weekly summary data');
                    }

                    const data = await response.json();
                    renderScoreGraph(data.daily_breakdown);

                } catch (error) {
                    console.error('Error fetching weekly summary data:', error);
                }
            }

            let tooltipTimeout;
            const scoreTooltip = document.getElementById('score-tooltip');

            function showTooltip(element, dayData) {
                clearTimeout(tooltipTimeout);

                document.getElementById('tooltip-date').textContent = new Date(dayData.date).toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
                document.getElementById('tooltip-score').textContent = dayData.daily_score;
                document.getElementById('tooltip-calories').textContent = Math.round(dayData.consumed_calories);
                document.getElementById('tooltip-target-calories').textContent = Math.round(dayData.target_calories);
                document.getElementById('tooltip-protein').textContent = Math.round(dayData.consumed_protein);
                document.getElementById('tooltip-target-protein').textContent = Math.round(dayData.target_protein);
                document.getElementById('tooltip-fat').textContent = Math.round(dayData.consumed_fat);
                document.getElementById('tooltip-target-fat').textContent = Math.round(dayData.target_fat);
                document.getElementById('tooltip-carbs').textContent = Math.round(dayData.consumed_carbohydrates);
                document.getElementById('tooltip-target-carbs').textContent = Math.round(dayData.target_carbohydrates);

                const messageContainer = document.getElementById('tooltip-message');
                const tooltips = dayData.status_message;

                if (typeof tooltips === 'object' && tooltips !== null) {
                    // Если это наш новый объект, форматируем его
                    messageContainer.innerHTML = `
                        <p>${tooltips.calories}</p>
                        <p>${tooltips.protein}</p>
                        <p>${tooltips.fat}</p>
                        <p>${tooltips.carbohydrates}</p>
                    `;
                } else {
                    // Если это старая строка (для обратной совместимости), просто показываем ее
                    messageContainer.textContent = tooltips || '';
                }

                // Position the tooltip
                const rect = element.getBoundingClientRect();
                const scrollX = window.scrollX || window.pageXOffset;
                const scrollY = window.scrollY || window.pageYOffset;

                // Сначала делаем видимым, чтобы рассчитать размеры
                scoreTooltip.classList.remove('opacity-0', 'pointer-events-none');
                scoreTooltip.classList.add('opacity-100');

                let top = rect.top + scrollY - scoreTooltip.offsetHeight - 15;
                let left = rect.left + scrollX + (rect.width / 2) - (scoreTooltip.offsetWidth / 2);

                // Ограничение по экрану
                if (top < scrollY + 10) {
                    top = rect.bottom + scrollY + 15;
                }
                if (left < 10) left = 10;
                if (left + scoreTooltip.offsetWidth > window.innerWidth - 10) {
                    left = window.innerWidth - scoreTooltip.offsetWidth - 10;
                }

                scoreTooltip.style.top = `${top}px`;
                scoreTooltip.style.left = `${left}px`;
                scoreTooltip.style.transform = 'scale(0.9)';

                tooltipTimeout = setTimeout(hideTooltip, 6000);
            }

            function hideTooltip() {
                scoreTooltip.style.transform = 'scale(0.7)';
                scoreTooltip.classList.remove('opacity-100');
                scoreTooltip.classList.add('opacity-0', 'pointer-events-none');
                // Clear the identifier and any pending hide timeout
                if(tooltipTimeout) clearTimeout(tooltipTimeout);
                scoreTooltip.dataset.identifier = '';
            }

            // Hide tooltip if clicked anywhere else on the document
            document.addEventListener('click', (event) => {
                if (!scoreTooltip.contains(event.target) && !event.target.closest('.score-circle')) {
                    hideTooltip();
                }
            });


            function renderScoreGraph(dailyBreakdown) {
                const graphContainer = document.getElementById('score-graph-container');
                graphContainer.innerHTML = ''; // Clear previous content

                const orderedDayNamesShort = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
                dailyBreakdown.sort((a, b) => new Date(a.date) - new Date(b.date));

                // --- Расчет и отображение среднего балла ---
                const scores = dailyBreakdown.map(d => d.daily_score).filter(s => s !== null);
                if (scores.length > 0) {
                    const averageScore = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
                    const avgLabel = document.getElementById('average-score-label');
                    avgLabel.textContent = averageScore;
                    avgLabel.classList.remove('hidden');
                }
                // --- Конец расчета ---

                dailyBreakdown.forEach((dayData) => {
                    const dayOfWeek = new Date(dayData.date).getDay();
                    const displayDayName = orderedDayNamesShort[dayOfWeek === 0 ? 6 : dayOfWeek - 1];
                    const isToday = new Date(dayData.date).toDateString() === new Date().toDateString();

                    const score = dayData.daily_score !== null ? dayData.daily_score : 0;
                    const color = dayData.status_color || '#F0F0F0';
                    const yPos = dayData.y_axis_pos !== null ? dayData.y_axis_pos : 0;

                    const topPosition = ((120 - yPos) / 120) * 100;

                    const circleClasses = [
                        'absolute', 'w-8', 'h-8', 'rounded-full', 'flex', 'items-center', 'justify-center', 'text-xs', 'font-bold',
                        'transition-all', 'duration-300', 'ease-out', getNeonGlowClass(color), 'score-circle'
                    ];
                    let circleStyle = `top: ${topPosition}%; transform: translateY(-50%);`;

                    if (isToday) {
                        circleClasses.push('border-2', 'animate-pulse');
                        circleStyle += `border-color: ${color}; color: ${color}; background-color: transparent;`;
                    } else {
                        // Логика для цвета текста
                        if (color === '#F0F0F0') {
                            circleClasses.push('text-black'); // Черный текст на белом фоне
                        } else {
                            circleClasses.push('text-white'); // Белый текст на остальных фонах
                        }
                        circleStyle += `background-color: ${color};`;
                    }

                    const dayColumn = document.createElement('div');
                    dayColumn.className = 'flex flex-col items-center justify-end h-full flex-1 relative';

                    const circleElement = document.createElement('div');
                    circleElement.className = circleClasses.join(' ');
                    circleElement.style = circleStyle;
                    circleElement.textContent = score;
                    circleElement.dataset.details = JSON.stringify(dayData);

                    circleElement.addEventListener('click', (event) => {
                        event.stopPropagation();
                        const isVisible = scoreTooltip.classList.contains('opacity-100');
                        const isForThisElement = scoreTooltip.dataset.identifier === dayData.date;

                        if (isVisible && isForThisElement) {
                            hideTooltip();
                        } else {
                            scoreTooltip.dataset.identifier = dayData.date;
                            showTooltip(circleElement, dayData);
                        }
                    });

                    const dayLabel = document.createElement('p');
                    dayLabel.className = 'text-xs text-gray-500 mt-1';
                    dayLabel.textContent = displayDayName;

                    dayColumn.appendChild(circleElement);
                    dayColumn.appendChild(dayLabel);
                    graphContainer.appendChild(dayColumn);
                });
            }

            fetchDashboardData();
            fetchWeeklySummaryData();
        });
    </script>

</body>
</html>
