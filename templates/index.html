<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ProgressLab</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/dashboard.css">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/images/apple-touch-icon.png">
</head>
<body class="h-full flex flex-col">

    <header class="text-center pb-2" style="padding-top: calc(2.5rem + env(safe-area-inset-top));">
        <h1 class="text-3xl font-extrabold tracking-wider">ProgressLab</h1>
        <p class="text-xs text-gray-500">Beta 0.1</p>
    </header>

    <main class="flex-grow flex flex-col items-center justify-start px-4 space-y-6 pb-24">

        <!-- 1. Центральное кольцо калорий (SVG) -->
        <div class="ring-container w-1/2 max-w-xs aspect-square neon-glow-amber relative">
            <svg id="calorie-ring" class="progress-ring-svg" viewBox="0 0 120 120">
                <circle class="progress-ring-bg" cx="60" cy="60" r="54" />
                <circle class="progress-ring-bar" cx="60" cy="60" r="54" style="stroke: var(--color-amber);" />
                <circle class="progress-ring-overflow" cx="60" cy="60" r="54" />
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
                <span class="calorie-label">КАЛОРИИ</span>
                <span id="calories-consumed" class="text-5xl font-extrabold" style="color: var(--color-amber);">0</span>
                <span class="calorie-goal-text" id="calorie-goal-info" style="font-size: 0.935rem;">ВСЕГО:</span>
            </div>
        </div>

        <!-- 2. Сетка макронутриентов (SVG) -->
        <div class="flex justify-around w-full max-w-lg space-x-4">
            <!-- Белки -->
            <div class="text-center flex flex-col items-center space-y-2">
                <div class="ring-container w-20 aspect-square neon-glow-protein-white relative">
                    <svg id="protein-ring" class="progress-ring-svg" viewBox="0 0 120 120">
                        <circle class="progress-ring-bg" cx="60" cy="60" r="54" />
                        <circle class="progress-ring-bar" cx="60" cy="60" r="54" style="stroke: var(--color-protein-white);" />
                        <circle class="progress-ring-overflow" cx="60" cy="60" r="54" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="protein-consumed" class="font-bold text-2xl" style="color: var(--color-protein-white);">0г</span>
                    </div>
                </div>
                <p class="text-base font-semibold" style="color: var(--color-protein-white);">Белки</p>
                <p id="protein-goal" class="macro-goal-value -mt-1.5">0г</p>
            </div>
            <!-- Жиры -->
            <div class="text-center flex flex-col items-center space-y-2">
                <div class="ring-container w-20 aspect-square neon-glow-golden-orange relative">
                    <svg id="fat-ring" class="progress-ring-svg" viewBox="0 0 120 120">
                        <circle class="progress-ring-bg" cx="60" cy="60" r="54" />
                        <circle class="progress-ring-bar" cx="60" cy="60" r="54" style="stroke: var(--color-golden-orange);" />
                        <circle class="progress-ring-overflow" cx="60" cy="60" r="54" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="fat-consumed" class="font-bold text-2xl" style="color: var(--color-golden-orange);">0г</span>
                    </div>
                </div>
                <p class="text-base font-semibold" style="color: var(--color-golden-orange);">Жиры</p>
                <p id="fat-goal" class="macro-goal-value -mt-1.5">0г</p>
            </div>
            <!-- Углеводы -->
            <div class="text-center flex flex-col items-center space-y-2">
                <div class="ring-container w-20 aspect-square neon-glow-muted-teal relative">
                    <svg id="carbs-ring" class="progress-ring-svg" viewBox="0 0 120 120">
                        <circle class="progress-ring-bg" cx="60" cy="60" r="54" />
                        <circle class="progress-ring-bar" cx="60" cy="60" r="54" style="stroke: var(--color-muted-teal);" />
                        <circle class="progress-ring-overflow" cx="60" cy="60" r="54" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="carbs-consumed" class="font-bold text-2xl" style="color: var(--color-muted-teal);">0г</span>
                    </div>
                </div>
                <p class="text-base font-semibold" style="color: var(--color-muted-teal);">Углеводы</p>
                <p id="carbs-goal" class="macro-goal-value -mt-1.5">0г</p>
            </div>
        </div>
    </main>

    {% set active_page = 'dashboard' %}
    {% include 'includes/bottom_nav.html' %}

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const OVERFLOW_STYLES = {
                calories:  { glowClass: 'overflow-glow-red'   },
                protein:   { glowClass: 'overflow-glow-green' },
                fat:       { glowClass: 'overflow-glow-red'   },
                carbs:     { glowClass: 'overflow-glow-red'   },
            };

            function getMacroType(ringId) {
                if (ringId.includes('protein'))   return 'protein';
                if (ringId.includes('fat'))       return 'fat';
                if (ringId.includes('carbs'))     return 'carbs';
                return 'calories';
            }

            function updateRingWithOverflow(ringId, consumed, goal) {
                const ring = document.getElementById(ringId);
                if (!ring) return;

                const type = getMacroType(ringId);
                const style = OVERFLOW_STYLES[type];
                const bar = ring.querySelector('.progress-ring-bar');
                const overflowBar = ring.querySelector('.progress-ring-overflow');
                const container = ring.closest('.ring-container');
                const radius = bar.r.baseVal.value;
                const circumference = 2 * Math.PI * radius;

                bar.style.strokeDasharray = `${circumference} ${circumference}`;
                overflowBar.style.strokeDasharray = `${circumference} ${circumference}`;

                // Убираем старые glow-классы
                if (container) container.classList.remove('overflow-glow-red', 'overflow-glow-green');
                overflowBar.classList.remove('overflow-red', 'overflow-green');

                if (goal === 0) {
                    bar.style.strokeDashoffset = circumference;
                    overflowBar.style.strokeDashoffset = circumference;
                    return;
                }

                const percentage = consumed / goal;

                // Основной бар (до 100%)
                const mainPercentage = Math.min(percentage, 1);
                const mainOffset = circumference - (mainPercentage * circumference);
                bar.style.strokeDashoffset = mainOffset;

                // Бар переполнения (после 100%)
                if (percentage > 1) {
                    const overflowColorClass = type === 'protein' ? 'overflow-green' : 'overflow-red';
                    overflowBar.classList.add(overflowColorClass);
                    if (container) container.classList.add(style.glowClass);

                    const overflowPercentage = Math.min(percentage - 1, 1);
                    const overflowOffset = circumference - (overflowPercentage * circumference);
                    overflowBar.style.strokeDashoffset = overflowOffset;
                } else {
                    overflowBar.style.strokeDashoffset = circumference;
                }
            }

            async function fetchDashboardData() {
                try {
                    const response = await fetch('/users/me/dashboard-stats', {
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('accessToken')}` }
                    });

                    if (!response.ok) {
                        if (response.status === 401) window.location.href = '/';
                        throw new Error('Failed to fetch dashboard data');
                    }

                    const data = await response.json();

                    // Калории
                    document.getElementById('calories-consumed').textContent = Math.round(data.consumed_calories);
                    document.getElementById('calorie-goal-info').textContent = `ВСЕГО: ${Math.round(data.target_calories)}`;
                    updateRingWithOverflow('calorie-ring', data.consumed_calories, data.target_calories);

                    // Белки
                    document.getElementById('protein-consumed').textContent = `${Math.round(data.consumed_protein)}г`;
                    document.getElementById('protein-goal').textContent = `${Math.round(data.target_protein)}г`;
                    updateRingWithOverflow('protein-ring', data.consumed_protein, data.target_protein);

                    // Жиры
                    document.getElementById('fat-consumed').textContent = `${Math.round(data.consumed_fat)}г`;
                    document.getElementById('fat-goal').textContent = `${Math.round(data.target_fat)}г`;
                    updateRingWithOverflow('fat-ring', data.consumed_fat, data.target_fat);

                    // Углеводы
                    document.getElementById('carbs-consumed').textContent = `${Math.round(data.consumed_carbohydrates)}г`;
                    document.getElementById('carbs-goal').textContent = `${Math.round(data.target_carbohydrates)}г`;
                    updateRingWithOverflow('carbs-ring', data.consumed_carbohydrates, data.target_carbohydrates);

                } catch (error) {
                    console.error('Error fetching dashboard data:', error);
                }
            }

            fetchDashboardData();
        });
    </script>

</body>
</html>
