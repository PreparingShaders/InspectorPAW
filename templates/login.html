<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProgressLab</title>
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <!-- Login Form -->
        <div id="login-view">
            <h1 class="auth-title">Добро пожаловать в ProgressLab</h1>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" name="username" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Пароль</label>
                    <input type="password" id="login-password" name="password" required>
                </div>
                <button type="submit" class="auth-button">Войти</button>
            </form>
            <div class="form-links">
                <p class="switch-form-link">Нет аккаунта? <a href="#" id="show-register">Зарегистрироваться</a></p>
                <p class="switch-form-link"><a href="#" id="show-forgot-password">Забыли пароль?</a></p>
            </div>
        </div>

        <!-- Register Form -->
        <div id="register-view" style="display: none;">
            <h1 class="auth-title">Регистрация в ProgressLab</h1>
            <form id="register-form">
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Пароль</label>
                    <input type="password" id="register-password" minlength="8" required>
                    <p class="password-criteria">Минимум 8 символов, 1 заглавная, 1 строчная, 1 цифра.</p>
                </div>
                <div class="form-group">
                    <label for="register-password-confirm">Подтвердите пароль</label>
                    <input type="password" id="register-password-confirm" minlength="8" required>
                </div>
                <button type="submit" class="auth-button">Создать аккаунт</button>
            </form>
            <p class="switch-form-link">Уже есть аккаунт? <a href="#" id="show-login">Войти</a></p>
        </div>

        <!-- Forgot Password Form -->
        <div id="forgot-password-view" style="display: none;">
            <h1 class="auth-title">Восстановить пароль</h1>
            <form id="forgot-password-form">
                <div class="form-group">
                    <label for="forgot-email">Email</label>
                    <input type="email" id="forgot-email" required>
                </div>
                <button type="submit" class="auth-button">Отправить код</button>
            </form>
            <p class="switch-form-link">Вернуться ко входу? <a href="#" id="back-to-login">Войти</a></p>
        </div>

        <p id="error-message" class="error-message" style="display: none;"></p>
        <p id="success-message" style="display: none; color: #28a745; text-align: center;"></p>
    </div>
    <script src="/static/js/login.js"></script>
</body>
</html>
