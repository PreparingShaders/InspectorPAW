<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Добавить прием пищи - ProgressLab</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <div class="main-container">
        <!-- Шапка -->
        <header class="dashboard-header">
            <h1 class="user-name">Добавить прием пищи</h1>
        </header>

        <!-- Форма для анализа -->
        <section class="ai-section">
            <form id="analyze-form">

                <!-- Новая кнопка для загрузки фото -->
                <label for="meal-image" class="upload-button-label">
                    Добавить фото
                </label>
                <input type="file" id="meal-image" accept="image/*" class="upload-input">

                <div class="form-group" style="margin-top: 20px;">
                    <label for="meal-description">Описание</label>
                    <textarea id="meal-description" rows="3" placeholder="Например: 'Большая порция гречки с куриной грудкой'"></textarea>
                </div>

                <!-- Кнопка "Анализировать" теперь будет прозрачной с контуром -->
                <button type="submit" class="analyze-meal-button transparent" id="analyze-button">
                    Анализировать
                </button>
            </form>
        </section>

        <!-- Секция с результатами (изначально скрыта) -->
        <section id="results-section" class="ai-section" style="display: none;">
            <h3 class="section-title">Результаты анализа</h3>
            <div id="ai-response-text" class="last-analysis-result"></div>

            <form id="confirm-form">
                <div class="form-group">
                    <label for="meal-type">Тип приема пищи</label>
                    <select id="meal-type">
                        <option value="breakfast">Завтрак</option>
                        <option value="lunch">Обед</option>
                        <option value="dinner">Ужин</option>
                        <option value="snack">Перекус</option>
                    </select>
                </div>

                <!-- Новые слайдеры -->
                <div class="slider-group">
                    <label for="calories">Калории</label>
                    <div class="slider-wrapper">
                        <input type="range" id="calories-slider" min="0" max="2000" step="10">
                        <input type="number" id="calories" class="slider-value" min="0">
                    </div>
                </div>
                <div class="slider-group">
                    <label for="protein">Белки (г)</label>
                    <div class="slider-wrapper">
                        <input type="range" id="protein-slider" min="0" max="200" step="1">
                        <input type="number" id="protein" class="slider-value" min="0">
                    </div>
                </div>
                <div class="slider-group">
                    <label for="fat">Жиры (г)</label>
                    <div class="slider-wrapper">
                        <input type="range" id="fat-slider" min="0" max="200" step="1">
                        <input type="number" id="fat" class="slider-value" min="0">
                    </div>
                </div>
                <div class="slider-group">
                    <label for="carbohydrates">Углеводы (г)</label>
                    <div class="slider-wrapper">
                        <input type="range" id="carbohydrates-slider" min="0" max="300" step="1">
                        <input type="number" id="carbohydrates" class="slider-value" min="0">
                    </div>
                </div>

                <button type="submit" class="analyze-meal-button transparent" id="confirm-button">Сохранить</button>
            </form>
        </section>

        <div id="error-message" class="error-message" style="text-align: center; margin-top: 20px;"></div>
    </div>

    {% set active_page = 'nutrition' %}
    {% include 'includes/bottom_nav.html' %}

    <script src="/static/js/analyze.js"></script>
</body>
</html>
