<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, minimal-ui">
    <title>AI HUB - ProgressLab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/ai_hub.css">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        .iridescent-text {
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff, #ffff00);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: iridescent-flow 4s linear infinite;
        }
        @keyframes iridescent-flow {
            to {
                background-position: 200% center;
            }
        }
        #model-selection-modal {
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="h-dvh flex flex-col">

    <header class="relative text-center pb-2 px-4" style="padding-top: calc(1.5rem + env(safe-area-inset-top));">
        <button onclick="history.back()" class="back-button">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
        </button>
        <h1 class="text-3xl font-extrabold tracking-wider iridescent-text">ProgressLab AI</h1>
        <div class="flex justify-center items-center space-x-2 mt-2">
            <button id="model-selection-button" class="text-xs text-gray-400 border border-gray-600 rounded-full px-3 py-1">
                Выбор модели
            </button>
            <p id="current-model-display" class="text-xs text-gray-500"></p>
        </div>
    </header>

    <main class="flex-grow flex flex-col min-h-0">
        <div id="chat-history" class="overflow-y-auto flex flex-col-reverse gap-4 p-4">
            <!-- Сообщения чата будут здесь -->
        </div>
    </main>

    <footer class="p-4" style="padding-bottom: calc(1rem + env(safe-area-inset-bottom));">
        <div class="chat-input-container">
            <input type="text" id="chat-input" placeholder="Сообщение...">
            <button id="send-button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6">
                    <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
                </svg>
            </button>
        </div>
    </footer>

    <!-- Модальное окно выбора модели -->
    <div id="model-selection-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
        <div class="modal-content w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-white">Выберите модель</h2>
                <button id="refresh-models-button" class="text-gray-400 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5M12 4.5a7.5 7.5 0 11-7.5 7.5" />
                    </svg>
                </button>
            </div>
            <div id="model-list" class="space-y-1 max-h-80 overflow-y-auto rounded-lg bg-black bg-opacity-20">
                <!-- Список моделей будет здесь -->
            </div>
            <button id="close-modal-button" class="w-full text-center mt-4">Закрыть</button>
        </div>
    </div>

    <script src="/static/js/ai_hub.js"></script>
</body>
</html>
