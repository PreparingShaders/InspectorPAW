<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, minimal-ui">
    <title>Сброс пароля - ProgressLab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body class="h-dvh flex flex-col items-center justify-center bg-gray-900 text-white">
    <div class="p-8 rounded-lg shadow-lg bg-gray-800 border border-gray-700 w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-6">Сброс пароля</h1>
        <form action="/reset-password" method="POST" class="space-y-4">
            <input type="hidden" name="token" value="{{ token }}">
            <div>
                <label for="new_password" class="block text-sm font-medium text-gray-300">Новый пароль</label>
                <input type="password" id="new_password" name="new_password" required minlength="8"
                       class="mt-1 block w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
            </div>
            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-300">Подтвердите пароль</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="8"
                       class="mt-1 block w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
            </div>
            <button type="submit"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                Установить новый пароль
            </button>
        </form>
        <p id="error-message" class="text-red-500 text-center mt-4 hidden"></p>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function(event) {
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const errorMessage = document.getElementById('error-message');

            if (newPassword !== confirmPassword) {
                errorMessage.textContent = 'Пароли не совпадают.';
                errorMessage.classList.remove('hidden');
                event.preventDefault();
            } else {
                errorMessage.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
