<style>
     /* Общее свечение для всех иконок */
     .nav-icon-base {
         filter: drop-shadow(0 0 2px rgba(0, 242, 255, 0.8));
         transition: all 0.2s ease-in-out;
     }
     /* Усиление свечения при наведении или активности */
     .nav-link:hover .nav-icon-base, .nav-link-active .nav-icon-base {
         filter: drop-shadow(0 0 5px rgba(0, 242, 255, 1));
     }

     /* Стиль для текстовой иконки AI */
     .ai-icon-text {
         font-size: 20px;
         font-weight: 900;
         letter-spacing: -1.5px;
         width: 36px;
         height: 36px;
         display: flex;
         align-items: center;
         justify-content: center;
         margin: 0 auto;
         line-height: 1;

         background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff, #ffff00);
         background-size: 200% auto;
         -webkit-background-clip: text;
         -webkit-text-fill-color: transparent;

         animation:
             iridescent-flow 4s linear infinite,
             iridescent-glow 4s linear infinite;
     }

     @keyframes iridescent-flow {
         to { background-position: 200% center; }
     }

     @keyframes iridescent-glow {
         0%   { filter: drop-shadow(0 0 5px #ff00ff); }
         25%  { filter: drop-shadow(0 0 7px #00ffff); }
         50%  { filter: drop-shadow(0 0 5px #ff00ff); }
         75%  { filter: drop-shadow(0 0 7px #ffff00); }
         100% { filter: drop-shadow(0 0 5px #ff00ff); }
     }
</style>
