"<!DOCTYPE html>
<html lang=\"ru\" class=\"h-full\">
<head>
    <meta charset=\"UTF-8\">
    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover\">
    <title>Смена временного пароля - ProgressLab</title>
    <script src=\"https://cdn.tailwindcss.com\"></script>
    <link rel=\"stylesheet\" href=\"/static/css/dashboard.css\">
</head>
<body class=\"h-dvh flex flex-col bg-gray-900 text-white\">

    <header class=\"text-center pb-2\" style=\"padding-top: calc(0.5rem + env(safe-area-inset-top));\">
        <h1 class=\"text-2xl font-extrabold tracking-wider\">Смена пароля</h1>
        <p class=\"text-xs text-yellow-400\">Вам необходимо сменить временный пароль</p>
    </header>

    <main class=\"flex-grow flex flex-col items-center justify-center px-4\">
        <div class=\"w-full max-w-sm glassmorphism neon-glow-pantone-gray rounded-2xl p-6\">
            <form id=\"force-password-form\" class=\"space-y-4\">
                <div>
                    <label for=\"email\" class=\"block text-sm font-medium text-gray-300 mb-1\">Email</label>
                    <input type=\"email\" id=\"email\" name=\"email\" required readonly
                           class=\"w-full p-3 rounded-lg bg-gray-600 border border-gray-500 text-white cursor-not-allowed\">
                </div>
                <div>
                    <label for=\"new_password\" class=\"block text-sm font-medium text-gray-300 mb-1\">Новый пароль</label>
                    <input type=\"password\" id=\"new_password\" name=\"new_password\" required
                           class=\"w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none\"
                           placeholder=\"Минимум 8 символов\">
                </div>
                <div>
                    <label for=\"confirm_password\" class=\"block text-sm font-medium text-gray-300 mb-1\">Подтвердите пароль</label>
                    <input type=\"password\" id=\"confirm_password\" name=\"confirm_password\" required
                           class=\"w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none\"
                           placeholder=\"Повторите пароль\">
                </div>
                
                <p id=\"error-message\" class=\"text-red-400 text-sm hidden\"></p>
                <p id=\"success-message\" class=\"text-green-400 text-sm hidden\"></p>

                <button type=\"submit\"
                        class=\"w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors\">
                    Сохранить новый пароль
                </button>
            </form>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('accessToken');
            const errorMsg = document.getElementById('error-message');
            const successMsg = document.getElementById('success-message');
            const emailInput = document.getElementById('email');

            if (!token) {
                window.location.href = '/';
                return;
            }

            // Получаем данные юзера, чтобы подставить email
            fetch('/users/me', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(user => {
                if (user.email) {
                    emailInput.value = user.email;
                }
            });

            document.getElementById('force-password-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMsg.style.display = 'none';
                successMsg.style.display = 'none';

                const newPass = document.getElementById('new_password').value;
                const confirmPass = document.getElementById('confirm_password').value;

                if (newPass.length < 8) {
                    errorMsg.textContent = 'Пароль должен быть не менее 8 символов.';
                    errorMsg.style.display = 'block';
                    return;
                }

                if (newPass !== confirmPass) {
                    errorMsg.textContent = 'Пароли не совпадают.';
                    errorMsg.style.display = 'block';
                    return;
                }

                try {
                    const response = await fetch('/users/me/change-password', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            new_password: newPass,
                            new_password_confirm: confirmPass
                        })
                    });

                    if (!response.ok) {
                        const data = await response.json();
                        throw new Error(data.detail || 'Ошибка смены пароля');
                    }

                    successMsg.textContent = 'Пароль успешно изменен! Перенаправление...';
                    successMsg.style.display = 'block';
                    
                    // Через 2 секунды кидаем на дашборд
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 2000);

                } catch (error) {
                    errorMsg.textContent = error.message;
                    errorMsg.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>"
