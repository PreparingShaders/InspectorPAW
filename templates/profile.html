<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Профиль - ProgressLab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="manifest" href="/static/manifest.json">
</head>
<body class="h-full flex flex-col">

    <header class="text-center pb-2" style="padding-top: calc(2.5rem + env(safe-area-inset-top));">
        <h1 class="text-3xl font-extrabold tracking-wider">Ваш профиль</h1>
    </header>

    <main class="flex-grow flex flex-col items-center justify-start px-4 space-y-6 pb-24">
        <div class="w-full">
            <form id="profile-form" class="space-y-4">
                <div class="form-group">
                    <label for="date_of_birth_day">Дата рождения</label>
                    <div class="grid grid-cols-3 gap-2">
                        <select id="date_of_birth_day" required>
                            <option value="">День</option>
                        </select>
                        <select id="date_of_birth_month" required>
                            <option value="">Месяц</option>
                        </select>
                        <select id="date_of_birth_year" required>
                            <option value="">Год</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="gender">Пол</label>
                    <select id="gender" required>
                        <option value="">Выберите пол</option>
                        <option value="male">Мужской</option>
                        <option value="female">Женский</option>
                        <option value="other">Другой</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="height_cm">Рост (см)</label>
                    <input type="number" id="height_cm" min="50" max="250" required>
                </div>

                <div class="form-group">
                    <label for="weight_kg">Текущий вес (кг)</label>
                    <input type="number" id="weight_kg" step="0.1" min="20" max="300" required>
                </div>

                <div class="form-group">
                    <label for="body_fat_percentage">Процент жира (%) (необязательно)</label>
                    <input type="number" id="body_fat_percentage" step="0.1" min="1" max="70">
                </div>

                <div class="form-group">
                    <label for="activity_level">Уровень активности</label>
                    <select id="activity_level" required>
                        <option value="sedentary">Сидячий образ жизни</option>
                        <option value="light">Легкая активность (1-3 тренировки в неделю)</option>
                        <option value="moderate">Умеренная активность (3-5 тренировок в неделю)</option>
                        <option value="active">Высокая активность (6-7 тренировок в неделю)</option>
                        <option value="very_active">Очень высокая активность (спортсмен)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="goal">Цель</label>
                    <select id="goal" required>
                        <option value="">Выберите цель</option>
                        <option value="fat_loss">Снижение веса</option>
                        <option value="maintenance">Поддержание веса</option>
                        <option value="mass_gain">Набор массы</option>
                    </select>
                </div>

                <!-- Блок с кольцами для КБЖУ (теперь перед ползунком) -->
                <div id="calculated-targets" class="pt-4">
                    <h3 class="text-lg font-semibold text-center mb-4">Ваша норма</h3>
                    <div class="flex justify-around w-full">
                        <!-- Калории -->
                        <div class="text-center flex flex-col items-center space-y-1">
                            <div class="ring-container w-16 aspect-square neon-glow-amber relative">
                                <svg id="profile-calories-ring" class="progress-ring-svg" viewBox="0 0 120 120">
                                    <circle class="progress-ring-bg" cx="60" cy="60" r="54" />
                                    <circle class="progress-ring-bar" cx="60" cy="60" r="54" style="stroke: var(--color-amber);" />
                                </svg>
                                <div class="absolute inset-0 flex flex-col items-center justify-center">
                                    <span id="profile-calories-value" class="font-bold text-lg" style="color: var(--color-amber);">0</span>
                                    <span class="label-text text-xs -mt-1">ккал</span>
                                </div>
                            </div>
                        </div>
                        <!-- Белки -->
                        <div class="text-center flex flex-col items-center space-y-1">
                            <div class="ring-container w-16 aspect-square neon-glow-protein-white relative">
                                <svg id="profile-protein-ring" class="progress-ring-svg" viewBox="0 0 120 120">
                                    <circle class="progress-ring-bg" cx="60" cy="60" r="54" />
                                    <circle class="progress-ring-bar" cx="60" cy="60" r="54" style="stroke: var(--color-protein-white);" />
                                </svg>
                                <div class="absolute inset-0 flex flex-col items-center justify-center">
                                    <span id="profile-protein-value" class="font-bold text-lg" style="color: var(--color-protein-white);">0</span>
                                    <span class="label-text text-xs -mt-1">г</span>
                                </div>
                            </div>
                        </div>
                        <!-- Жиры -->
                        <div class="text-center flex flex-col items-center space-y-1">
                            <div class="ring-container w-16 aspect-square neon-glow-golden-orange relative">
                                <svg id="profile-fat-ring" class="progress-ring-svg" viewBox="0 0 120 120">
                                    <circle class="progress-ring-bg" cx="60" cy="60" r="54" />
                                    <circle class="progress-ring-bar" cx="60" cy="60" r="54" style="stroke: var(--color-golden-orange);" />
                                </svg>
                                <div class="absolute inset-0 flex flex-col items-center justify-center">
                                    <span id="profile-fat-value" class="font-bold text-lg" style="color: var(--color-golden-orange);">0</span>
                                    <span class="label-text text-xs -mt-1">г</span>
                                </div>
                            </div>
                        </div>
                        <!-- Углеводы -->
                        <div class="text-center flex flex-col items-center space-y-1">
                            <div class="ring-container w-16 aspect-square neon-glow-muted-teal relative">
                                <svg id="profile-carbs-ring" class="progress-ring-svg" viewBox="0 0 120 120">
                                    <circle class="progress-ring-bg" cx="60" cy="60" r="54" />
                                    <circle class="progress-ring-bar" cx="60" cy="60" r="54" style="stroke: var(--color-muted-teal);" />
                                </svg>
                                <div class="absolute inset-0 flex flex-col items-center justify-center">
                                    <span id="profile-carbs-value" class="font-bold text-lg" style="color: var(--color-muted-teal);">0</span>
                                    <span class="label-text text-xs -mt-1">г</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-group relative" id="goal-intensity-group" style="display: none;">
                    <label for="goal_intensity" class="text-center block">Интенсивность цели</label>
                    <!-- Значение ползунка, позиционируется JS -->
                    <span id="goal-intensity-value" class="absolute block text-center font-bold" style="top: 2.5rem; transform: translateX(-50%);">0</span>

                    <input type="range" id="goal_intensity" min="-1" max="1" step="0.1" value="0" class="styled-slider w-full mt-10">

                    <div class="flex justify-between items-center mt-2">
                        <span class="text-sm text-gray-400">Медленнее</span>
                        <span class="text-sm text-gray-400">Быстрее</span>
                    </div>
                </div>

                <button type="submit" class="w-full py-3 text-lg font-semibold rounded-xl bg-transparent neon-glow-pantone-gray mt-8">
                    Сохранить профиль
                </button>
            </form>
            <button type="button" id="logout-button" class="w-full py-3 text-lg font-semibold rounded-xl bg-transparent neon-glow-pantone-gray mt-4">
                Выйти
            </button>
            <p id="error-message" class="text-red-500 text-center mt-4"></p>
            <p id="success-message" class="text-green-500 text-center mt-4"></p>
        </div>
    </main>

    {% set active_page = 'profile' %}
    {% include 'includes/bottom_nav.html' %}

    <script src="/static/js/profile.js"></script>
</body>
</html>
