<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Сброс Пароля - ProgressLab</title>
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div id="reset-password-view">
            <h1 class="auth-title">Сброс пароля</h1>
            <p class="auth-subtitle">
                Мы отправили 6-значный код на <strong class="font-medium">{{ email }}</strong>. Введите его и новый пароль.
            </p>

            <form id="reset-password-form" class="space-y-6" action="/reset-password-form" method="post">
                <input type="hidden" name="email" value="{{ email }}">

                <div class="form-group">
                    <label for="code">Код подтверждения</label>
                    <input id="code" name="code" type="text" required
                           class="auth-input text-center tracking-widest"
                           placeholder="------" maxlength="6" pattern="[0-9]{6}">
                </div>

                <div class="form-group">
                    <label for="new_password">Новый пароль</label>
                    <input id="new_password" name="new_password" type="password" required minlength="8" class="auth-input">
                    <p class="password-criteria">Минимум 8 символов, 1 заглавная, 1 строчная, 1 цифра.</p>
                </div>

                <div class="form-group">
                    <label for="new_password_confirm">Подтвердите новый пароль</label>
                    <input id="new_password_confirm" name="new_password_confirm" type="password" required minlength="8" class="auth-input">
                </div>

                <div id="error-message" class="error-message" style="display: none;">{{ error }}</div>

                <button type="submit" class="auth-button">Сбросить пароль</button>
            </form>

            <div class="switch-form-link">
                <p>Не получили код?</p>
                <button id="resend-btn" disabled class="resend-button">
                    Отправить снова (<span id="timer">40</span>)
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const resendBtn = document.getElementById('resend-btn');
            const timerSpan = document.getElementById('timer');
            const errorMessageDiv = document.getElementById('error-message');

            if (errorMessageDiv.textContent.trim()) {
                errorMessageDiv.style.display = 'block';
            }

            let countdown = 40;

            function startTimer() {
                resendBtn.disabled = true;
                timerSpan.parentElement.style.color = '#9ca3af';

                const interval = setInterval(() => {
                    countdown--;
                    timerSpan.textContent = countdown;
                    if (countdown <= 0) {
                        clearInterval(interval);
                        resendBtn.disabled = false;
                        resendBtn.innerHTML = 'Отправить снова';
                        timerSpan.parentElement.style.color = '';
                    }
                }, 1000);
            }

            resendBtn.addEventListener('click', async () => {
                if (resendBtn.disabled) return;

                countdown = 40;
                startTimer();
                errorMessageDiv.style.display = 'none';

                try {
                    const response = await fetch('/forgot-password', { // Используем тот же эндпоинт для повторной отправки
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({ email: '{{ email }}' })
                    });

                    if (!response.ok) {
                        const result = await response.json();
                        errorMessageDiv.textContent = result.detail || 'Произошла ошибка. Попробуйте позже.';
                        errorMessageDiv.style.display = 'block';
                    } else {
                        errorMessageDiv.textContent = 'Новый код отправлен!';
                        errorMessageDiv.style.display = 'block';
                        errorMessageDiv.style.color = '#28a745';
                    }
                } catch (error) {
                    errorMessageDiv.textContent = 'Ошибка сети. Пожалуйста, проверьте ваше подключение.';
                    errorMessageDiv.style.display = 'block';
                }
            });

            startTimer();
        });
    </script>
</body>
</html>
