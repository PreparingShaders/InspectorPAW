<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, minimal-ui">
    <title>Тренировки - ProgressLab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/dashboard.css">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ProgressLab">
    <link rel="apple-touch-icon" href="/static/images/apple-touch-icon.png">
    <link rel="manifest" href="/static/manifest.json">
</head>
<body class="h-dvh flex flex-col">

    <header class="text-center pb-2" style="padding-top: calc(2.5rem + env(safe-area-inset-top));">
        <h1 class="text-3xl font-extrabold tracking-wider">Тренировки</h1>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center px-4 text-center pb-24">
        <div class="w-full max-w-md">
            <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-12 w-12 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <h2 class="mt-4 text-xl font-semibold text-white">Раздел в разработке</h2>
            <p class="mt-2 text-gray-400">Мы усердно работаем над созданием этого раздела. Загляните позже!</p>
        </div>
    </main>

    {% set active_page = 'workouts' %}
    {% include 'includes/bottom_nav.html' %}

</body>
</html>
