<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, minimal-ui">
    <title>Питание - ProgressLab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <style>
        .ai-coach-container {
            border-radius: 1.5rem; padding: 1rem; position: relative; overflow: hidden;
            background: rgba(41, 41, 56, 0.6); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .ai-coach-container::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 1.5rem; padding: 1px;
            background: linear-gradient(90deg, #8A2BE2, #4169E1, #00BFFF, #32CD32, #FFD700, #FF4500, #8A2BE2);
            background-size: 400% 100%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out; mask-composite: exclude;
            animation: running-border 15s linear infinite;
        }
        .period-btn { transition: all 0.3s ease-in-out; }
        .period-btn.active {
            background-color: rgba(255, 255, 255, 0.1);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
            color: #fff;
        }
        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body class="h-full flex flex-col">

    <header class="text-center pb-2" style="padding-top: calc(0.01rem + env(safe-area-inset-top));">
        <h1 class="text-3xl font-extrabold tracking-wider">ProgressLab</h1>
        <p class="text-xs text-gray-500">Beta 0.1</p>
    </header>

    <main class="flex-grow flex flex-col items-center justify-start px-4 space-y-2 pb-16">

        <!-- 1. Блок со средними показателями -->
        <div class="w-full">
            <div id="average-stats" class="pt-0">
                <h3 class="text-lg font-semibold text-center mb-2">Средние показатели</h3>
                <div class="flex justify-center w-full space-x-4">
                    <!-- Калории -->
                    <div class="text-center flex flex-col items-center space-y-1">
                        <div class="ring-container w-12 aspect-square neon-glow-amber relative">
                            <svg id="avg-calories-ring" class="progress-ring-svg" viewBox="0 0 120 120">
                                <circle class="progress-ring-bg" cx="60" cy="60" r="54" />
                                <circle class="progress-ring-bar" cx="60" cy="60" r="54" style="stroke: var(--color-amber);" />
                            </svg>
                            <div class="absolute inset-0 flex flex-col items-center justify-center">
                                <span id="avg-calories-value" class="font-bold text-base" style="color: var(--color-amber);">0</span>
                            </div>
                        </div>
                        <p class="text-xs font-semibold text-gray-400 mt-1">Ккал</p>
                    </div>
                    <!-- Белки -->
                    <div class="text-center flex flex-col items-center space-y-1">
                        <div class="ring-container w-12 aspect-square neon-glow-protein-white relative">
                            <svg id="avg-protein-ring" class="progress-ring-svg" viewBox="0 0 120 120">
                                <circle class="progress-ring-bg" cx="60" cy="60" r="54" />
                                <circle class="progress-ring-bar" cx="60" cy="60" r="54" style="stroke: var(--color-protein-white);" />
                            </svg>
                            <div class="absolute inset-0 flex flex-col items-center justify-center">
                                <span id="avg-protein-value" class="font-bold text-base" style="color: var(--color-protein-white);">0</span>
                            </div>
                        </div>
                        <p class="text-xs font-semibold text-gray-400 mt-1">Б</p>
                    </div>
                    <!-- Жиры -->
                    <div class="text-center flex flex-col items-center space-y-1">
                        <div class="ring-container w-12 aspect-square neon-glow-golden-orange relative">
                            <svg id="avg-fat-ring" class="progress-ring-svg" viewBox="0 0 120 120">
                                <circle class="progress-ring-bg" cx="60" cy="60" r="54" />
                                <circle class="progress-ring-bar" cx="60" cy="60" r="54" style="stroke: var(--color-golden-orange);" />
                            </svg>
                            <div class="absolute inset-0 flex flex-col items-center justify-center">
                                <span id="avg-fat-value" class="font-bold text-base" style="color: var(--color-golden-orange);">0</span>
                            </div>
                        </div>
                        <p class="text-xs font-semibold text-gray-400 mt-1">Ж</p>
                    </div>
                    <!-- Углеводы -->
                    <div class="text-center flex flex-col items-center space-y-1">
                        <div class="ring-container w-12 aspect-square neon-glow-muted-teal relative">
                            <svg id="avg-carbs-ring" class="progress-ring-svg" viewBox="0 0 120 120">
                                <circle class="progress-ring-bg" cx="60" cy="60" r="54" />
                                <circle class="progress-ring-bar" cx="60" cy="60" r="54" style="stroke: var(--color-muted-teal);" />
                            </svg>
                            <div class="absolute inset-0 flex flex-col items-center justify-center">
                                <span id="avg-carbs-value" class="font-bold text-base" style="color: var(--color-muted-teal);">0</span>
                            </div>
                        </div>
                        <p class="text-xs font-semibold text-gray-400 mt-1">У</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. Индекс дисциплины питания -->
        <div class="w-full space-y-3">
            <div class="w-full flex justify-center">
                <div class="relative flex w-full max-w-xs p-1 rounded-full glassmorphism">
                    <button id="one-month-btn" class="period-btn active w-1/2 rounded-full py-1 text-sm font-semibold">1 месяц</button>
                    <button id="three-months-btn" class="period-btn w-1/2 rounded-full py-1 text-sm font-semibold text-gray-400">3 месяца</button>
                </div>
            </div>
            <div class="relative h-40 w-full glassmorphism neon-glow-pantone-gray rounded-2xl flex items-end justify-around pb-2 pt-2 px-2">
                <div class="absolute top-1/2 left-0 right-0 border-t border-dashed border-[#F0F0F0]/80 -translate-y-1/2"></div>
                <span id="average-score-label" class="absolute top-1/2 left-2 -translate-y-1/2 text-xs font-bold text-[#F0F0F0] hidden px-2" style="background-color: #1a202c; text-shadow: 0 0 8px #F0F0F0;"></span>
                <div id="score-graph-container" class="flex justify-around w-full h-full items-center relative z-10">
                    <!-- Circles will be dynamically added here by JS -->
                </div>
            </div>
        </div>

        <div id="analysis-wizard" class="w-full flex-grow flex flex-col min-h-[375px]">

            <div id="step-1" class="step active ai-section w-full flex-grow">
                <form id="analyze-form" class="flex flex-col h-full justify-between">
                    <div class="w-full">
                        <label for="meal-image" class="upload-button-label neon-glow-pantone-gray block w-full text-center py-4 cursor-pointer">Добавить фото</label>
                        <input type="file" id="meal-image" accept="image/*" class="hidden">
                        <div class="form-group mt-5">
                            <label for="meal-description">Описание еды (необязательно)</label>
                            <textarea id="meal-description" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" rows="3" placeholder="Например: 'Гречка с курицей'"></textarea>
                        </div>
                    </div>
                    <button type="submit" class="w-full py-4 mt-4 text-lg font-semibold rounded-xl bg-transparent neon-glow-pantone-gray" id="analyze-button" disabled>Анализировать</button>
                </form>
            </div>

            <div id="step-2" class="step ai-section w-full flex-grow items-center justify-center">
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin shadow-[0_0_15px_#A855F7]"></div>
                    <p id="model-status" class="text-purple-400 font-bold animate-pulse mt-4 text-center">Анализ состава...</p>
                    <div id="analysis-status" class="text-xs text-gray-500 mt-2 text-center"></div>
                </div>
            </div>

            <div id="step-3" class="step ai-section w-full flex-grow">
                <div id="ai-coach-section" class="w-full ai-coach-container mb-4">
                    <h4 id="ai-coach-title" class="text-sm font-bold text-white/70 mb-2 text-center">COBET OT AI</h4>
                    <p id="ai-coach-advice" class="text-white text-center text-sm leading-tight"></p>
                </div>

                <div id="ai-response-text" class="hidden"></div>

                <form id="confirm-form" class="space-y-4">
                    <div class="form-group">
                        <label for="meal-type">Прием пищи</label>
                        <select id="meal-type" class="w-full bg-white/5 border border-white/10 rounded-xl p-2 text-white">
                            <option value="breakfast">Завтрак</option>
                            <option value="lunch" selected>Обед</option>
                            <option value="dinner">Ужин</option>
                            <option value="snack">Перекус</option>
                        </select>
                    </div>

                    <div id="interactive-rings-container" class="grid grid-cols-2 gap-3">
                        <div class="flex flex-col"><label class="text-xs text-amber-500">Ккал</label><input type="number" id="calories" class="bg-white/5 border border-white/10 rounded-lg p-2 text-white"></div>
                        <div class="flex flex-col"><label class="text-xs text-blue-300">Белки</label><input type="number" id="protein" class="bg-white/5 border border-white/10 rounded-lg p-2 text-white"></div>
                        <div class="flex flex-col"><label class="text-xs text-orange-400">Жиры</label><input type="number" id="fat" class="bg-white/5 border border-white/10 rounded-lg p-2 text-white"></div>
                        <div class="flex flex-col"><label class="text-xs text-teal-400">Углев.</label><input type="number" id="carbohydrates" class="bg-white/5 border border-white/10 rounded-lg p-2 text-white"></div>
                    </div>

                    <div class="flex space-x-3 pt-2">
                        <button type="button" id="cancel-analysis-btn" class="w-1/3 py-3 rounded-xl bg-white/10 text-gray-400 border border-white/5">Отмена</button>
                        <button type="submit" id="confirm-button" class="w-2/3 py-3 rounded-xl bg-green-600 text-white font-bold shadow-[0_0_15px_rgba(34,197,94,0.4)]">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>


        <!-- Контейнер для логов приемов пищи -->
        <div id="meal-logs-container" class="w-full space-y-4"></div>
        <div id="error-message" class="text-red-500 text-center mt-4"></div>
    </main>

    {% set active_page = 'nutrition' %}
    {% include 'includes/bottom_nav.html' %}

    <!-- Tooltip for Score Graph -->
    <div id="score-tooltip" class="absolute z-50 p-3 rounded-2xl glassmorphism neon-glow-pantone-gray text-white opacity-0 transition-all duration-300 pointer-events-none shadow-2xl" style="min-width: 180px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); transform: scale(0.9);">
        <p class="font-black text-base mb-1.5 tracking-wide border-b border-white/10 pb-1" id="tooltip-date"></p>
        <div class="space-y-1 text-sm">
            <div class="flex justify-between items-center"><span class="text-gray-400">Score:</span><span id="tooltip-score" class="font-bold text-lg"></span></div>
            <div class="flex justify-between items-center"><span style="color: var(--color-amber);">Ккал:</span><span class="font-medium"><span id="tooltip-calories"></span> / <span id="tooltip-target-calories"></span></span></div>
            <div class="flex justify-between items-center"><span style="color: var(--color-protein-white);">Белки:</span><span class="font-medium"><span id="tooltip-protein"></span>г / <span id="tooltip-target-protein"></span>г</span></div>
            <div class="flex justify-between items-center"><span style="color: var(--color-golden-orange);">Жиры:</span><span class="font-medium"><span id="tooltip-fat"></span>г / <span id="tooltip-target-fat"></span>г</span></div>
            <div class="flex justify-between items-center"><span style="color: var(--color-muted-teal);">Углеводы:</span><span class="font-medium"><span id="tooltip-carbs"></span>г / <span id="tooltip-target-carbs"></span>г</span></div>
        </div>
        <div class="mt-2 text-xs italic font-medium leading-tight opacity-90" id="tooltip-message"></div>
    </div>

    <script src="/static/js/nutrition.js"></script>
</body>
</html>
